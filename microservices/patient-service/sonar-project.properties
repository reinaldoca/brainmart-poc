# sonar-project.properties - Patient Service (.NET 8)
# SonarCloud org key: reinaldoca (from sonarcloud.io/organizations/reinaldoca)
# Hardcoded org key avoids dependency on SONAR_ORGANIZATION variable.
# The scanner reads this file automatically from projectBaseDir.

sonar.organization=reinaldoca
sonar.projectKey=brainmart-poc
sonar.projectName=Brainmart POC
sonar.projectVersion=1.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/TestResults/*.trx

# false: pipeline does not block on Quality Gate. Result visible in SonarCloud UI.
sonar.qualitygate.wait=false

sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs,**/Data/PatientDbContext.cs,**/Data/AuditTrailHealthCheck.cs