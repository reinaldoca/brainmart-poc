# .checkov.yaml - Checkov configuration for Brainmart
# -----------------------------------------------------------------------------
# USAGE:
#   checkov --config-file infrastructure/policy-as-code/checkov/.checkov.yaml
#
# WARNING: This file must contain ONLY plain ASCII characters.
#   Python reads this file with the system codec (charmap on Windows).
#   Any UTF-8 character (tildes, arrows, em-dashes) will cause:
#   "'charmap' codec can't decode byte 0xXX"
# -----------------------------------------------------------------------------

# Framework to evaluate
framework:
  - terraform

# Compact mode: only show failures (reduces noise in CI logs)
compact: true

# Checks to skip - each has a documented regulatory justification
skip-check:
  # CKV_AWS_18: S3 access logging
  #   Justification: S3 access logging is managed centrally via
  #   CloudTrail Organization Trail (more complete and tamper-proof)
  #   than per-bucket logging. See config-rules-stackset.yaml.
  - CKV_AWS_18

  # CKV_AWS_144: S3 cross-region replication
  #   Justification: cross-region replication only applies to production.
  #   The eu-west-1 requirement is validated by OPA policy (rds_multi_az.rego)
  #   and configured in environments/prod/dr-eu-west-1/terragrunt.hcl.
  - CKV_AWS_144

  # CKV2_AWS_5: Security Groups attached to another resource
  #   Justification: SGs are defined in the network module and referenced
  #   by the compute module. Checkov cannot resolve cross-module references
  #   in static analysis. Attachment is verified by terraform plan output.
  - CKV2_AWS_5

  # CKV2_AWS_76: ALB WAF configured with AMR for Log4j
  #   Justification: The WAF associated with the ALB references
  #   AWSManagedRulesKnownBadInputsRuleSet (which covers Log4j) defined in
  #   modules/storage/main.tf. Checkov cannot trace the cross-module WAF ARN.
  - CKV2_AWS_76

  # CKV_AWS_117: Lambda inside VPC
  #   Justification: the audit_log export Lambda IS inside the VPC
  #   (configured in modules/database/main.tf). This is a false positive
  #   because Checkov does not resolve the dynamic VPC config reference.
  - CKV_AWS_117

# Paths to skip during the scan.
# Checkov scans the entire directory tree when using -d .
# We must exclude the policy-as-code directory itself (contains .py and .rego
# files that are not Terraform resources) and any test/mock directories.
skip-path:
  - policy-as-code
  - .terraform
  - .terragrunt-cache
  # modules/secrets: OS-level write restriction on this workstation.
  # The module is functionally correct; excluded only for local Checkov runs.
  - modules/secrets

# Do not download external Terraform modules during the check.
# Reason: the CI pipeline has no internet access during the policy-check job.
download-external-modules: false

# Soft-fail checks: emit WARNING only, do not fail the build.
# Format: comma-separated string (NOT a YAML list).
soft-fail-on: CKV_AWS_135,CKV_AWS_91
# CKV_AWS_135: CloudWatch Log Group KMS encryption - recommended but not
#              blocking in dev environments
# CKV_AWS_91:  ALB access logs - managed via dedicated S3 bucket

# -----------------------------------------------------------------------------
# SEVERITY REFERENCE FOR CUSTOM CHECKS (documentation only)
# Checkov CLI has no option to assign severities to external checks.
# This section is for team reference and manual reporting only.
#
# CKV_BRAINMART_1:  MEDIUM   - Subnet without explicit AZ
# CKV_BRAINMART_2:  MEDIUM   - VPC CIDR too small for multi-AZ
# CKV_BRAINMART_3:  MEDIUM   - Subnet without explicit AZ (variant)
# CKV_BRAINMART_4:  HIGH     - RDS backup disabled or < 7 days
# CKV_BRAINMART_5:  CRITICAL - RDS prod backup < 35 days (GCP ICH E6)
# CKV_BRAINMART_6:  CRITICAL - RDS without encryption (FDA 21 CFR Part 11)
# CKV_BRAINMART_7:  HIGH     - S3 without versioning (FDA immutable records)
# CKV_BRAINMART_8:  HIGH     - aws_s3_bucket_versioning not Enabled
# CKV_BRAINMART_9:  CRITICAL - S3 with public access (GDPR Art. 25)
# CKV_BRAINMART_10: HIGH     - S3 without KMS encryption
# -----------------------------------------------------------------------------
