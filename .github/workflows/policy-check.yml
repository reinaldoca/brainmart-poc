# ══════════════════════════════════════════════════════════════════════════════
# pipeline/.github/workflows/policy-check.yml
#
# Workflow independiente para ejecutar Checkov + OPA en PRs.
# Se puede ejecutar sin el pipeline completo de CI/CD.
# Útil para revisores que quieren validar cambios de IaC rápidamente.
# ══════════════════════════════════════════════════════════════════════════════

name: "🔍 Policy-as-Code Standalone"

on:
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/policy-check.yml"
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          external_checks_dir: infrastructure/policy-as-code/checkov/custom_policies/
          config_file: infrastructure/policy-as-code/checkov/.checkov.yaml
          framework: terraform
          # La action bridgecrewio/checkov-action acepta output_format separado por comas
          output_format: cli,sarif,junitxml
          # output_file_path: directorio donde se guardan los resultados
          output_file_path: checkov-results
          soft_fail: false
          download_external_modules: false

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results/results_sarif.sarif
          category: checkov-iac

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.checkov.outcome }}' === 'success' ? '✅' : '❌';
            const body = `## ${exitCode} Checkov IaC Policy Check\n\n` +
              `**Resultado:** ${{ steps.checkov.outcome }}\n\n` +
              `Ver detalles completos en los [artefactos del workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).\n\n` +
              `### Políticas Custom de Brainmart verificadas:\n` +
              `- CKV_BRAINMART_1-3: VPC Multi-AZ (HA)\n` +
              `- CKV_BRAINMART_4-6: RDS Backup + Cifrado (GCP/FDA)\n` +
              `- CKV_BRAINMART_7-10: S3 Versioning + Block Public (GDPR)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results/
          retention-days: 90

  opa:
    name: OPA Rego Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: v0.65.0

      - name: Run OPA tests (unit tests for Rego policies)
        run: |
          opa test infrastructure/policy-as-code/opa/policies/ \
                   infrastructure/policy-as-code/opa/tests/ \
            --verbose \
            --format pretty

      - name: Install Conftest
        run: |
          curl -Lo conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest.tar.gz && sudo mv conftest /usr/local/bin/

      - name: Validate Rego policies syntax
        run: |
          for policy in infrastructure/policy-as-code/opa/policies/*.rego; do
            echo "Validando: $policy"
            opa parse "$policy" && echo "  ✅ OK" || echo "  ❌ Error de sintaxis"
          done
