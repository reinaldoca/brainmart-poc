server {
    # ──────────────────────────────────────────────────────────────────────────
    # nginx.conf — Servidor para Angular 17 SPA en ECS / Docker
    #
    # SEGURIDAD:
    #   - CSP estricta para prevenir XSS
    #   - HSTS para forzar HTTPS
    #   - Ocultar información del servidor
    #   - Limit rate para prevenir DoS
    #   - No exponer rutas de administración
    # ──────────────────────────────────────────────────────────────────────────

    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Ocultar versión de nginx (no dar información a atacantes)
    server_tokens off;

    # ── Compresión ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml font/truetype font/opentype
        application/vnd.ms-fontobject image/svg+xml;

    # ── Headers de seguridad (complementan los de CloudFront) ─────────────────
    # Estos headers se aplican cuando se sirve directamente (dev local)
    # En producción, CloudFront agrega sus propios headers via Response Policy
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header X-Frame-Options          "DENY"                    always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy estricta
    # 'strict-dynamic' + nonce: el bundle de Angular recibe un nonce único por request
    # que permite ejecutar los scripts inline sin 'unsafe-inline'
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'strict-dynamic';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self';
        connect-src 'self' https://api.brainmart.health https://api-dev.brainmart.health;
        frame-ancestors 'none';
        form-action 'self';
        upgrade-insecure-requests;
        block-all-mixed-content;
    " always;

    # HSTS: forzar HTTPS por 1 año (solo aplica si se sirve desde HTTPS directamente)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Caché de assets estáticos ─────────────────────────────────────────────
    # Angular genera nombres con hash (main.abc123.js) → cachear 1 año
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;  # No loguear requests de assets (reduce ruido)
    }

    # index.html: sin caché (siempre verificar si hay nueva versión)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Angular HTML5 Routing ─────────────────────────────────────────────────
    # Todas las rutas de Angular se sirven como index.html
    # (la lógica de routing está en el bundle de Angular, no en nginx)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Rate limiting para prevenir brute force ────────────────────────────────
    # (se define en el contexto http{} del nginx.conf principal)
    # limit_req zone=api burst=20 nodelay;

    # ── Bloquear acceso a archivos sensibles ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Health check para el ALB ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
